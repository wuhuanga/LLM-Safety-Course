# Agent系统配置

# ==================== LLM配置 ====================
llm:
  provider: dashscope      # 可选: dashscope, openai
  model: qwen-max         # 推荐模型：qwen-turbo(免费), qwen-plus, qwen-max
  temperature: 0.7
  max_tokens: 1000
  timeout: 60

# ==================== 嵌入模型配置 ====================
embedding:
  provider: dashscope      # 可选: dashscope, sentence-transformers, openai
  model: qwen-text-embedding-v2
  dimensions: 1536
  # 如果使用本地sentence-transformers：
  # model: BAAI/bge-small-zh-v1.5
  # device: cpu  # 或 cuda

# Agent配置
agent:
  name: "ScienceWorld Agent"
  max_steps: 50
  max_retries: 3
  use_memory: true

# 记忆配置
memory:
  semantic:
    enabled: true
    collection_name: "semantic_memory"
  episodic:
    enabled: true
    collection_name: "episodic_memory"
  retrieval:
    top_k: 5
    similarity_threshold: 0.7

# 环境配置
environment:
  name: "scienceworld"
  task: "all"
  max_episode_length: 100

# 日志配置
logging:
  level: "INFO"
  save_logs: true
  log_path: "./outputs/logs"